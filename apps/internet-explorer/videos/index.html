<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Microsoft Homepage Clone</title>
  <!-- Font Awesome -->

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="menu-btn">
    <i class="fas fa-bars fa-2x"></i>
  </div>

  <!-- Nav -->
  <nav class="main-nav">
    <div class="container">
      <!-- Logo (Left) -->
      <img src="assets/header-logo.png" alt="Logo" class="logo">
      
      <div class="header-divider"></div>
      
      <!-- Nav Links (Center) -->
      <ul class="main-menu">
        <li><a href="#">Video</a></li>
        <li><a href="#">Images</a></li>
        <li><a href="#">Code</a></li>
      </ul>

      <div class="header-divider"></div>

      <!-- Icon Group (Right) -->
      <div class="icon-menu">
        <!-- GitHub Link -->
        <a href="https://github.com/your-username" target="_blank" aria-label="GitHub Profile" class="icon-link">
          <i class="fab fa-github fa-lg"></i>
        </a>
        <!-- LinkedIn Link -->
        <a href="https://linkedin.com/in/your-profile" target="_blank" aria-label="LinkedIn Profile" class="icon-link">
          <i class="fab fa-linkedin fa-lg"></i>
        </a>
        <!-- Instagram Link -->
        <a href="https://instagram.com/your-username" target="_blank" aria-label="Instagram Profile" class="icon-link">
          <i class="fab fa-instagram fa-lg"></i>
        </a>

  <div id="main-content-container" class="container">
    <!-- Showcase REMOVED -->
    <!-- Home cards REMOVED -->
    <!-- Lightbox REMOVED -->

      <div class="content-visual">

      </div>
      <div class="content-text">
        <h2>Video Section</h2>
        <p>Watch project demos, walkthroughs, or related video content here. This section provides a dynamic look at the project in action.</p>
      </div>
    </section>
    <!-- End New Content Area -->

  </div> <!-- End Container -->

    <!-- Links Section Removed -->

        <div><i class="fas fa-globe fa-2x"></i> English (United States)</div>
